name: Metrics Skyline
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate skyline metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ieatcheese99
          template: classic
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: current-year
          plugin_skyline_frames: 60
          plugin_skyline_quality: 0.8
          filename: metrics.plugin.skyline.svg

      - name: Commit and push
        run: |
          git config --local user.email "harjatizabdan@gmail.com"
          git config --local user.name "ieatcheese99"
          if [ -f "metrics.plugin.skyline.svg" ]; then
            git add metrics.plugin.skyline.svg
            git commit -m "chore: update skyline metrics"
            git push
          fi
