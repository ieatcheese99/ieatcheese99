name: Metrics Skyline
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: ieatcheese99
          template: classic
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: current-year
          outputs: metrics.plugin.skyline.svg
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add metrics.plugin.skyline.svg
          git commit -m "chore: update skyline" || true
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          branch: output
          force: true
