name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ieatcheese99
          template: classic
          base: header, activity, community, repositories, metadata
          
          # Plugin-plugin yang kamu minta
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_repositories: yes
          plugin_repositories_featured: ieatcheese99/ieatcheese99
          plugin_topics: yes
          plugin_topics_mode: icons
          
          # GitHub Skyline
          plugin_skyline: yes
          plugin_skyline_year: 2024
          filename: github-metrics.svg # File utama
