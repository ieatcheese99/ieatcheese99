name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}] # Update setiap jam 12 malam
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ieatcheese99 # Ganti jika username kamu berbeda
          template: classic
          base: header, activity, community, repositories, metadata
          
          # 1. Isometric Calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 2. Featured Repositories (Sesuaikan nama reponya)
          plugin_repositories: yes
          plugin_repositories_featured: ieatcheese99/ieatcheese99

          # 3. Starred Topics
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons
          plugin_topics_sort: stars

          # 4. GitHub Skyline
          plugin_skyline: yes
          plugin_skyline_year: 2024
          plugin_skyline_frames: 60
