<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Matrix Donut 3D</title>
<style>
    body { 
        background-color: #000; color: #00FF41; 
        display: flex; justify-content: center; align-items: center; 
        height: 100vh; margin: 0; overflow: hidden;
    }
    pre { 
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px; line-height: 12px; font-weight: bold; 
        text-shadow: 0 0 5px #00ff41; 
    }
</style>
</head>
<body>
<pre id="donut"></pre>
<script>
    const pre = document.getElementById('donut');
    let A = 1, B = 1;

    function renderDonut() {
        let b = [], z = [];
        A += 0.07; B += 0.03;
        let cA = Math.cos(A), sA = Math.sin(A), cB = Math.cos(B), sB = Math.sin(B);
        
        for(let k = 0; k < 1760; k++) { 
            b[k] = k % 80 === 79 ? '\n' : ' '; 
            z[k] = 0; 
        }
        
        for(let j = 0; j < 6.28; j += 0.07) {
            let ct = Math.cos(j), st = Math.sin(j);
            for(let i = 0; i < 6.28; i += 0.02) {
                let sp = Math.sin(i), cp = Math.cos(i), h = ct + 2;
                let D = 1 / (sp * h * sA + st * cA + 5);
                let t = sp * h * cA - st * sA;
                
                let x = 0 | (40 + 30 * D * (cp * h * cB - t * sB));
                let y = 0 | (12 + 15 * D * (cp * h * sB + t * cB));
                let o = x + 80 * y;
                let N = 0 | (8 * ((st * sA - sp * ct * cA) * cB - sp * ct * sA - st * cA - cp * ct * sB));
                
                if(y < 22 && y >= 0 && x >= 0 && x < 79 && D > z[o]) { 
                    z[o] = D; 
                    b[o] = ".,-~:;=!*#$@01"[N > 0 ? N : 0]; 
                }
            }
        }
        pre.innerHTML = b.join("");
        setTimeout(renderDonut, 50);
    }
    renderDonut();
</script>
</body>
</html>
